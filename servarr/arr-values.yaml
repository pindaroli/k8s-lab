jellyfin:
  extraEnvVars:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    - name: TZ
      value: "Europe/Rome"
  ingress:
    enabled: false
  service:
      type: NodePort
      externalTrafficPolicy: Local
  persistence:
    media:
      existingClaim: servarr-jellyfin-media
    config:
      storageClass: csi-nfs-stripe-arr-conf
  resources:
    requests:
      cpu: 2000m
      memory: 2Gi
  extraVolumeMounts:
    - name: media
      mountPath: /media/foto
      subPath: foto

sonarr:
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Rome
  persistence:
    createInitContainer: false
    storageClass: csi-nfs-stripe-arr-conf
    media:
      existingClaim: servarr-jellyfin-media

  
qbittorrent:
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Rome
  service:
