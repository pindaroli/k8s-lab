jellyfin:
  env:
    TZ: Europe/Rome
  ingress:
    enabled: false
  service:
      type: NodePort
      externalTrafficPolicy: Local
  persistence:
    media:
      existingClaim: servarr-jellyfin-media
    config:
      storageClass: nfs-subdir
  resources:
    requests:
      cpu: 2000m
      memory: 2Gi
  extraVolumeMounts:
    - name: media
      mountPath: /media/foto
      subPath: foto

