    repository: ghcr.io/hotio/prowlarr
    tag: "release"
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/Rome
    # Hotio/NET Core uses double underscores for config mapping
    PROWLARR__POSTGRES__HOST: 10.108.78.94 # Stable Service ClusterIP (Bypasses DNS/VPN issues)
    PROWLARR__POSTGRES__PORT: "5432"
    PROWLARR__POSTGRES__MAINDB: prowlarr
    PROWLARR__POSTGRES__LOGDB: prowlarr  # Using same DB for logs (simplification)
    PROWLARR__POSTGRES__USER: prowlarr
    PROWLARR__POSTGRES__PASSWORD: prowlarr
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  extraContainers:
    # 1. Xray Core: Provides SOCKS5 Proxy on localhost:10808
