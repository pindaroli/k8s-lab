jellyfin:
  enabled: false
  image:
    tag: "10.10.7"  # was: 10.10.1
  extraEnvVars:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    - name: TZ
      value: "Europe/Rome"
  ingress:
    enabled: false
  service:
      type: NodePort
      externalTrafficPolicy: Local
  persistence:
    storageClass: csi-nfs-stripe-arr-conf
    storageClassName: csi-nfs-stripe-arr-conf
    config:
      enabled: true
      storageClass: csi-nfs-stripe-arr-conf
      storageClassName: csi-nfs-stripe-arr-conf
    media:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: servarr-jellyfin-media
  resources:
    requests:
      cpu: 2000m
      memory: 2Gi
    limits:
      memory: 4Gi
  extraVolumeMounts:
    - name: media
      mountPath: /media/foto
      subPath: foto

