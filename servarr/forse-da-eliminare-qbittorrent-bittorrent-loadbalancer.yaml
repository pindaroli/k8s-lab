---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bittorrent-lb
  namespace: arr
  labels:
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/instance: servarr
    service.type: bittorrent-external
  annotations:
    metallb.universe.tf/loadBalancer-ips: "192.168.1.4"
    # Enable UPnP port mapping for this LoadBalancer IP
    metallb.universe.tf/allow-shared-ip: "qbittorrent-upnp"
spec:
  type: LoadBalancer
  ports:
  - name: bittorrent-tcp
    port: 30661
    targetPort: 30661
    protocol: TCP
  - name: bittorrent-udp
    port: 30661
    targetPort: 30661
    protocol: UDP
  selector:
    app.kubernetes.io/instance: servarr
    app.kubernetes.io/name: qbittorrent
  loadBalancerIP: 192.168.1.4
  # Preserve source IP for UPnP to work correctly
  externalTrafficPolicy: Local