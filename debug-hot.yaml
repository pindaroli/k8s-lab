apiVersion: v1
kind: Pod
metadata:
  name: debug-hot-mount
  namespace: kube-system
spec:
  nodeName: talos-cp-01
  restartPolicy: Never
  containers:
  - name: debug
    image: busybox
    command: ["sh", "-c", "mkdir -p /mnt/check && mount -t ext4 /dev/sdb /mnt/check && echo 'MOUNT_SUCCESS_EXT4' && umount /mnt/check || echo 'MOUNT_FAILED'"]
    securityContext:
      privileged: true
  volumes: []
