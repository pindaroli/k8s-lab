apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: kubernetes-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure  # <--- AGGIUNTO
  routes:
    - match: Host(`k8s-dash`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: kubernetes-dashboard
          port: 443
