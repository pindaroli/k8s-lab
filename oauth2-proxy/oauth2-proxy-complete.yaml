# Complete oauth2-proxy deployment
# Note: Create secrets separately with kubectl create secret
apiVersion: v1
kind: Namespace
metadata:
  name: oauth2-proxy
  labels:
    name: oauth2-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: allowed-emails
  namespace: oauth2-proxy
data:
  allowed.txt: |
    o.pindaro@gmail.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        ports:
        - containerPort: 4180
          name: http
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy
              key: client-id
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy
              key: client-secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy
              key: cookie-secret
        - name: OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE
          value: "/emails/allowed.txt"
        - name: OAUTH2_PROXY_EMAIL_DOMAINS
          value: "gmail.com"
        args:
        - --provider=google
        - --email-domain=gmail.com
        - --authenticated-emails-file=/emails/allowed.txt
        - --upstream=static://202
        - --http-address=0.0.0.0:4180
        - --cookie-secure=true
        - --cookie-httponly=true
        - --cookie-domain=.pindaroli.org
        - --cookie-samesite=none
        - --cookie-refresh=1h
        - --cookie-expire=24h
        - --skip-provider-button=true
        - --silence-ping-logging=true
        - --show-debug-on-error=true
        - --set-xauthrequest=true
        - --set-authorization-header=true
        - --pass-access-token=true
        - --pass-user-headers=true
        - --reverse-proxy=true
        - --whitelist-domain=.pindaroli.org
        - --redirect-url=https://auth.pindaroli.org/oauth2/callback
        volumeMounts:
        - name: emails
          mountPath: /emails
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: emails
        configMap:
          name: allowed-emails
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  type: ClusterIP
  ports:
  - port: 4180
    targetPort: 4180
    protocol: TCP
    name: http
  selector:
    app: oauth2-proxy
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy-ingressroute
  namespace: oauth2-proxy
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.pindaroli.org`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy-redirect
  namespace: oauth2-proxy
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`auth.pindaroli.org`)
      kind: Rule
      services:
        - name: oauth2-proxy
          port: 4180
      middlewares:
        - name: redirect-to-https
          namespace: oauth2-proxy
