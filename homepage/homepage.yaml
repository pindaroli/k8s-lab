apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
secrets:
  - name: homepage
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    kubernetes.io/service-account.name: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - traefik.io
    resources:
      - ingressroutes
    verbs:
      - get
      - list
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
      - gateways
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    # No additional settings configured
  custom.css: |
    # Add custom CSS here
  custom.js: |
    # Add custom JS here
  bookmarks.yaml: |
    # Empty bookmarks list
  services.yaml: |
    - "Kubernetes Services":
        - Kubernetes Dashboard:
            href: https://dashboard.pindaroli.org
            description: Kubernetes cluster management dashboard
            icon: kubernetes-dashboard.png
        - Traefik Dashboard:
            href: https://traefik-dash.pindaroli.org
            description: Traefik reverse proxy dashboard
            icon: traefik.png
    - Services:
        - Jellyfin:
            href: https://jellyfin.pindaroli.org
            description: Media server for movies, TV shows and music
            icon: jellyfin.png
        - qBittorrent:
            href: https://qbittorrent.pindaroli.org
            description: BitTorrent client
            icon: qbittorrent.png
        - Truenas:
            href: https://nas.pindaroli.org
            description: TrueNAS server
            icon: https://www.svgrepo.com/show/331613/truenas.svg
        - OPNsense:
            href: https://opnsense.pindaroli.org
            description: OPNsense firewall
            icon: opnsense.png
        - Proxmox:
            href: https://pve.pindaroli.org
            description: Proxmox server
            icon: proxmox.png
    
    - "Arr Services":
        # - Sonarr:
        #     href: https://sonarr.pindaroli.org
        #     description: TV series management
        #     icon: sonarr.png
        - Radarr:
            href: https://radarr.pindaroli.org
            description: Movie management
            icon: radarr.png
        - Calibre-web:
            href: https://calibre-web.pindaroli.org
            description: Web-based ebook library management
            icon: calibre-web.png
        - Lidarr:
            href: https://lidarr.pindaroli.org
            description: Music management
            icon: lidarr.png
        - Prowlarr:
            href: https://prowlarr.pindaroli.org
            description: Indexer management
            icon: prowlarr.png
        # - Bazarr:
        #     href: https://bazarr.pindaroli.org
        #     description: Subtitle management
        #     icon: bazarr.png
        # - Jellyseerr:
        #     href: https://jellyseerr.pindaroli.org
        #     description: Request management for Jellyfin
        #     icon: jellyseerr.png
    
    - "Remote Access":
        - Kasmweb:
            href: https://kasmweb.pindaroli.org
            description: Goto Jumphost
            icon:  mdi-monitor-dashboard      
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K8s Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: |
    # Docker configuration (empty)
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.pindaroli.org
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress-route
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.pindaroli.org`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
      middlewares:
        - name: oauth2-auth
  tls:
    secretName: pindaroli-wildcard-tls
---
# TrueNAS su 192.168.1.250:443
apiVersion: v1
kind: Service
metadata:
  name: truenas-external
spec:
  ports:
  - port: 443
    targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-external
subsets:
- addresses:
  - ip: "192.168.1.250"
  ports:
  - port: 443
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas-route
  namespace: default
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`nas.pindaroli.org`)
    kind: Rule
    services:
    - name: truenas-external
      port: 443
      scheme: https
      serversTransport: skip-verify
    middlewares:
    - name: oauth2-auth
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: skip-verify
  namespace: default
spec:
  insecureSkipVerify: true
---
