apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
secrets:
  - name: homepage
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    kubernetes.io/service-account.name: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - traefik.io
    resources:
      - ingressroutes
    verbs:
      - get
      - list
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
      - gateways
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: "Home Dashboard"
    subtitle: "Pindaroli Lab"
    background:
      image: https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80
      blur: "sm"
      saturate: 50
      brightness: 50
    layout:
      "Kubernetes Services":
        style: row
        columns: 4
      "AI services":
        style: row
        columns: 4
      "Arr Services":
        style: row
        columns: 4
      "Infrastructure":
        style: row
        columns: 4
      "Network Infrastructure":
        style: row
        columns: 4
      "Remote Access":
        style: row
        columns: 4
      "GitOps":
        style: row
        columns: 4
  custom.css: |
    /* Custom CSS */
  custom.js: |
    /* Custom JS */
  bookmarks.yaml: |
    # Empty bookmarks list
  services.yaml: |
    - "Kubernetes Services":
        - Traefik Dashboard:
            href: https://traefik-dash.pindaroli.org
            description: Traefik reverse proxy dashboard
            icon: traefik.png

    - "AI services":
        - n8n:
            href: https://n8n.pindaroli.org
            description: Workflow automation platform
            icon: n8n.png

    - "Arr Services":
        - Jellyfin:
            href: https://jellyfin.pindaroli.org
            description: Media server for movies, TV shows and music
            icon: jellyfin.png
        - qBittorrent:
            href: https://qbittorrent.pindaroli.org
            description: BitTorrent client
            icon: qbittorrent.png
        - Radarr:
            href: https://radarr.pindaroli.org
            description: Movie management
            icon: radarr.png
        - Lidarr:
            href: https://lidarr.pindaroli.org
            description: Music management
            icon: lidarr.png

        - Prowlarr:
            href: https://prowlarr.pindaroli.org
            description: Indexer management
            icon: prowlarr.png
        - Tdarr:
            href: https://tdarr.pindaroli.org
            description: Audio/Video Library Transcoder
            icon: tdarr.png
        - Calibre-web:
            href: https://calibre-web.pindaroli.org
            description: Web-based ebook library management
            icon: calibre-web.png

    - "Infrastructure":
        - Truenas:
            href: https://nas.pindaroli.org
            description: TrueNAS server
            icon: https://www.svgrepo.com/show/331613/truenas.svg
        - OPNsense:
            href: https://opnsense.pindaroli.org
            description: OPNsense firewall
            icon: opnsense.png
        - Proxmox:
            href: https://pve.pindaroli.org
            description: Proxmox server
            icon: proxmox.png
        - MinIO:
            href: https://minio.pindaroli.org
            description: S3 Object Storage
            icon: minio.png
        - Grafana:
            href: https://grafana.pindaroli.org
            description: Monitoring Dashboard
            icon: grafana.png

    - "Network Infrastructure":
        - Core Switch:
            href: https://sw-core.pindaroli.org
            description: Switch 10G (Main)
            icon: mdi-switch
        - Bed Room Switch:
            href: https://sw-letto.pindaroli.org
            description: Switch 2.5G (Letto)
            icon: mdi-switch
        - Server Switch:
            href: https://sw-server.pindaroli.org
            description: Switch 2.5G (Server)
            icon: mdi-switch
        - Access Point:
            href: https://ap.pindaroli.org
            description: Cudy AP11000
            icon: mdi-wifi

    - "Remote Access":
        - Kasmweb:
            href: https://kasmweb.pindaroli.org
            description: Goto Jumphost
            icon: mdi-monitor-dashboard

    - "GitOps":
        - Prefect Console:
            href: https://prefect.pindaroli.org
            description: Workflow & Task Orchestrator
            icon: mdi-api
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K8s Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: |
    # Docker configuration (empty)
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "home,home.pindaroli.org"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: homepage-content-type
  namespace: default
spec:
  contentType: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: homepage-cache-control
  namespace: default
spec:
  headers:
    customResponseHeaders:
      Cache-Control: "no-cache, no-store, must-revalidate"
      Pragma: "no-cache"
      Expires: "0"
---
# External Access (OAuth2)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress-external
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.pindaroli.org`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
      middlewares:
        - name: homepage-content-type
          namespace: default
        - name: homepage-cache-control
          namespace: default
        - name: oauth2-auth
          namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls

---
# TrueNAS su 10.10.10.50:443
apiVersion: v1
kind: Service
metadata:
  name: truenas-external
spec:
  ports:
  - port: 443
    targetPort: 443
---
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: truenas-external-1
  labels:
    kubernetes.io/service-name: truenas-external
addressType: IPv4
ports:
  - port: 443
    protocol: TCP
endpoints:
  - addresses:
      - "10.10.10.50"
    conditions:
      ready: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas-route
  namespace: default
spec:
  entryPoints:
  - websecure
  routes:
  # External / Public: OAuth Protected
  - match: Host(`nas.pindaroli.org`)
    kind: Rule
    services:
    - name: truenas-external
      port: 443
      scheme: https
      serversTransport: skip-verify
    middlewares:
    - name: oauth2-auth
      namespace: traefik
  # Internal / Short: Basic Auth (or No Auth)
  # NOTE: To use this, 'nas' must resolve to Traefik VIP (10.10.20.56) in DNS, not the Storage IP.
  - match: Host(`nas`) || Host(`nas-internal.pindaroli.org`)
    kind: Rule
    services:
    - name: truenas-external
      port: 443
      scheme: https
      serversTransport: skip-verify
  tls:
    secretName: pindaroli-wildcard-tls
---
