apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress-route
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homepage.pindaroli.org`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
  tls:
    secretName: pindaroli-wildcard-tls