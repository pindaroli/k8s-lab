apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-local
  namespace: default
  labels:
    app.kubernetes.io/name: homepage-local
secrets:
  - name: homepage-local
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage-local
  namespace: default
  labels:
    app.kubernetes.io/name: homepage-local
  annotations:
    kubernetes.io/service-account.name: homepage-local
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-local
  labels:
    app.kubernetes.io/name: homepage-local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage-local
    namespace: default
---
