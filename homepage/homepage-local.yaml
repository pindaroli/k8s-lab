# Local Homepage Deployment with Internal Configuration
# This creates a separate homepage instance for local access with *.local domains

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-local
  namespace: default
  labels:
    app.kubernetes.io/name: homepage-local
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: "Home Dashboard (Local Network)"
    subtitle: "Internal Access - Basic Auth"
    favicon: https://gethomepage.dev/img/favicon.ico
    headerStyle: boxed
    hideVersion: true
  custom.css: |
    # Add custom CSS here
  custom.js: |
    # Add custom JS here
  bookmarks.yaml: |
    # Empty bookmarks list
  services.yaml: |
    - "Media Services":
        - Jellyfin:
            href: https://jellyfin-internal.pindaroli.org
            description: Media server for movies, TV shows and music
            icon: jellyfin.png
        - qBittorrent:
            href: https://qbittorrent-internal.pindaroli.org
            description: BitTorrent client
            icon: qbittorrent.png

    - "Infrastructure (Direct Access)":
        - TrueNAS:
            href: https://192.168.1.250
            description: TrueNAS server (direct IP)
            icon: https://www.svgrepo.com/show/331613/truenas.svg
        - OPNsense:
            href: https://192.168.1.1
            description: OPNsense firewall (direct IP)
            icon: opnsense.png
        - Proxmox:
            href: https://192.168.1.10:8006
            description: Proxmox server (direct IP)
            icon: proxmox.png

    - "Arr Services":
        - Radarr:
            href: https://radarr-internal.pindaroli.org
            description: Movie management
            icon: radarr.png
        - Lidarr:
            href: https://lidarr-internal.pindaroli.org
            description: Music management
            icon: lidarr.png
        - Readarr:
            href: https://readarr-internal.pindaroli.org
            description: Book management
            icon: readarr.png
        - Prowlarr:
            href: https://prowlarr-internal.pindaroli.org
            description: Indexer management
            icon: prowlarr.png
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K8s Cluster (Local)"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23
  docker.yaml: |
    # Docker configuration (empty)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-local
  namespace: default
  labels:
    app.kubernetes.io/name: homepage-local
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage-local
    spec:
      serviceAccountName: homepage  # Reuse existing service account
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "home-internal.pindaroli.org,192.168.1.3,192.168.1.4,192.168.1.5"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage-local  # Use local config
        - name: logs
          emptyDir: {}

---
# ClusterIP Service for internal access
apiVersion: v1
kind: Service
metadata:
  name: homepage-local
  namespace: default
  labels:
    app.kubernetes.io/name: homepage-local
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: homepage-local

---
# IngressRoute for home.local domain access with basic auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-local-ingress
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home-internal.pindaroli.org`)
      kind: Rule
      services:
        - name: homepage-local
          port: 3000
      middlewares:
        - name: basic-auth
          namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls