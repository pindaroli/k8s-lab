apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-server
  namespace: monitoring
subsets:
  - addresses:
      # L'IP fisico del Mac Studio secondo rete.json
      - ip: 10.10.20.100
    ports:
      - name: metrics
        port: 11434
        protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-server
  namespace: monitoring
  labels:
    app: ollama
    job: ollama
spec:
  ports:
    - name: metrics
      port: 11434
      targetPort: 11434
      protocol: TCP
  # Headless service: non fa proxy, mappa direttamente agli Endpoints definiti sopra
  clusterIP: None
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ollama-monitor
  namespace: monitoring
  labels:
    # L'operatore di monitoring di solito richiede specifiche label per processare il ServiceMonitor (spesso release: victoria-metrics)
    # Rimuovi o modificale se il tuo operatore accetta tutto.
    app: ollama
spec:
  selector:
    matchLabels:
      app: ollama
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      # Ollama non richiede autenticazione o TLS per le metriche base
      scheme: http
