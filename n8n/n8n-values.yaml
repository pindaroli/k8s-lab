# Community Chart Values for n8n in 'n8n' namespace
# Refactored for community-charts/n8n schema

image:
  repository: n8nio/n8n
  tag: 1.40.0
  pullPolicy: Always

# Database Configuration
db:
  type: postgresdb

# Security context (Root level in community chart)
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000

# Main Pod Configuration
main:
  persistence:
    enabled: true
    existingClaim: n8n-config-pvc
    accessMode: ReadWriteMany
    size: 10Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # extraEnvVars must be a MAP for this chart
  extraEnvVars:
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-main-rw.cnpg-system.svc.cluster.local
    DB_POSTGRESDB_PORT: "5432"
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-db-password
          key: password
    N8N_EDITOR_BASE_URL: https://n8n.pindaroli.org
    N8N_WEBHOOK_URL: https://n8n.pindaroli.org
    WEBHOOK_URL: https://n8n.pindaroli.org
    GENERIC_TIMEZONE: Europe/Rome
    TZ: Europe/Rome

# Service
service:
  type: ClusterIP
  port: 5678
