apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n-ingress
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.pindaroli.org`)
      kind: Rule
      middlewares:
        - name: oauth2-auth
          namespace: traefik
      services:
        - name: n8n
          port: 80
  tls:
    secretName: pindaroli-wildcard-tls