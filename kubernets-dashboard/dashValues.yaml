# Minimal Kubernetes Dashboard values
# Disables Kong proxy, nginx, and ingress generation

# App configuration
app:
  # Ingress configuration - disabled
  ingress:
    enabled: false

# API configuration
api:
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 250m
      memory: 400Mi

# Auth configuration  
auth:
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 250m
      memory: 400Mi

# Web configuration
web:
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 250m
      memory: 400Mi

# Kong proxy - DISABLED
kong:
  enabled: false

# Nginx - DISABLED
nginx:
  enabled: false

# Metrics scraper
metricsScraper:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 250m
      memory: 400Mi

# Cert manager - disabled since we'll use external TLS
cert-manager:
  enabled: false

# Extra objects - can be used for custom ingress later
extraManifests: []
