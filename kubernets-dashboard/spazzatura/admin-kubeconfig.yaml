apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: 
    server: https://k8s-control:16443
  name: microk8s-cluster
contexts:
- context:
    cluster: microk8s-cluster
    user: admin-user
  name: admin-user@microk8s
current-context: admin-user@microk8s
users:
- name: admin-user
  user:
    token: TOKEN_PLACEHOLDER