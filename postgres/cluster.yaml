apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-main
  namespace: cnpg-system
spec:
  instances: 3
  
  # Guarantee one instance per node
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

  # Storage Configuration
  storage:
    storageClass: local-postgres
    size: 100Gi
  
  # WAL Storage (Optimization)
  walStorage:
    storageClass: local-postgres
    size: 4Gi

  # Bootstrap (Empty DB)
  bootstrap:
    initdb:
      database: app
      owner: app
      
  # Monitoring
  monitoring:
    enablePodMonitor: true

  # Backup (Placeholder - Enable after credentials setup)
