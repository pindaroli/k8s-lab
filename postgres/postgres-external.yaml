apiVersion: v1
kind: Service
metadata:
  name: postgres-main-external
  namespace: cnpg-system
  annotations:
    metallb.universe.tf/allow-shared-ip: "postgres-main"
spec:
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    cnpg.io/cluster: postgres-main
    cnpg.io/instanceRole: primary
