# MetalLB Speaker Security Context Patch
# Fixes "bind: permission denied" errors for ARP responder operations
# Apply after MetalLB Helm installation: kubectl patch daemonset metallb-speaker -n metallb-system --patch-file metallb-speaker-security.yaml

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: metallb-speaker
  namespace: metallb-system
spec:
  template:
    spec:
      # Enable host network access for ARP operations
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: speaker
        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
            - NET_BIND_SERVICE
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false