# Complete MetalLB configuration for k8s-lab cluster
# This file contains all necessary MetalLB resources with proper security context

---
# Namespace with Pod Security Standards for privileged operations
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    # Pod Security Standards labels for privileged access (required for ARP operations)
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
    # MetalLB labels
    app.kubernetes.io/instance: metallb
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: metallb

---
# IP Address Pool - defines the IP range for LoadBalancer services
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: my-ip-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.3-192.168.1.13

---
# L2 Advertisement - announces IPs via Layer 2 (ARP) on local network
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - my-ip-pool