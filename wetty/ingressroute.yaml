sapiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wetty-ingressroute
  namespace: wetty
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`terminal.pindaroli.org`)
      kind: Rule
      services:
        - name: wetty-service
          port: 80
      middlewares:
        - name: wetty-headers
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wetty-redirect
  namespace: wetty
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`terminal.pindaroli.org`)
      kind: Rule
      services:
        - name: wetty-service
          port: 80
      middlewares:
        - name: redirect-to-https