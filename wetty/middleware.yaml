apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wetty-auth
  namespace: wetty
spec:
  basicAuth:
    secret: wetty-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wetty-headers
  namespace: wetty
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-For: ""
      X-Real-IP: ""
    customResponseHeaders:
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Content-Security-Policy: "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: ws: wss:; img-src 'self' data:; connect-src 'self' ws: wss:;"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wetty-ratelimit
  namespace: wetty
spec:
  rateLimit:
    average: 10
    period: "1m"
    burst: 20
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: wetty
spec:
  redirectScheme:
    scheme: https
    permanent: true