apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetty-opnsense
  namespace: wetty
  labels:
    app: wetty-opnsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wetty-opnsense
  template:
    metadata:
      labels:
        app: wetty-opnsense
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      hostAliases:
      - ip: "192.168.1.1"
        hostnames:
        - "opnsense"
        - "pve"
        - "proxmox.local"
      containers:
      - name: wetty
        image: wettyoss/wetty:latest
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        command:
        - sh
        - -c
        - |
          cp /root/.ssh/keys/ssh-privatekey /tmp/wetty_key
          chmod 600 /tmp/wetty_key
          exec node . --ssh-host 192.168.1.1 --ssh-user root --ssh-auth publickey,password,keyboard-interactive --ssh-key /tmp/wetty_key --port 3002 --title "Terminal - OPNsense" --base / --ssh-options="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=3"
        volumeMounts:
        - name: ssh-key-rsa
          mountPath: /root/.ssh/keys
          readOnly: true
        - name: ssh-config
          mountPath: /root/.ssh/ssh_config
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsUser: 0
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: ssh-key-rsa
        secret:
          secretName: wetty-ssh-key
          defaultMode: 0400
      - name: ssh-config
        configMap:
          name: wetty-config
---
apiVersion: v1
kind: Service
metadata:
  name: wetty-opnsense-service
  namespace: wetty
  labels:
    app: wetty-opnsense
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: wetty-opnsense
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wetty-opnsense-ingressroute
  namespace: wetty
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`opnsense.pindaroli.org`)
      kind: Rule
      services:
        - name: wetty-opnsense-service
          port: 80
      middlewares:
        - name: wetty-auth
        - name: wetty-headers
  tls:
    secretName: pindaroli-wildcard-tls