apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetty-k8s-control
  namespace: wetty
  labels:
    app: wetty-k8s-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wetty-k8s-control
  template:
    metadata:
      labels:
        app: wetty-k8s-control
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      hostAliases:
      - ip: "192.168.1.11"
        hostnames:
        - "k8s-control"
      - ip: "192.168.1.249" 
        hostnames:
        - "k8s-runner-1"
      - ip: "192.168.1.1"
        hostnames:
        - "pve"
        - "proxmox.local"
      - ip: "192.168.1.250"
        hostnames:
        - "truenas"
      containers:
      - name: wetty
        image: wettyoss/wetty:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        command:
        - sh
        - -c
        - |
          cp /root/.ssh/keys/ssh-privatekey /tmp/wetty_key
          chmod 600 /tmp/wetty_key
          cp /root/.ssh/ssh_config/ssh_config /root/.ssh/config
          exec node . --ssh-host k8s-control --ssh-user root --ssh-auth publickey --ssh-key /tmp/wetty_key --port 3000 --title "Terminal - K8s Lab" --base / --ssh-config /root/.ssh/config
        volumeMounts:
        - name: ssh-key-rsa
          mountPath: /root/.ssh/keys
          readOnly: true
        - name: ssh-config
          mountPath: /root/.ssh/ssh_config
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsUser: 0
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: ssh-key-rsa
        secret:
          secretName: wetty-ssh-key
          defaultMode: 0400
      - name: ssh-config
        configMap:
          name: wetty-config