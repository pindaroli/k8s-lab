---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: servarr
  namespace: monitoring
  labels:
    release: victoria-monitoring
spec:
  jobLabel: servarr
  namespaceSelector:
    matchNames:
      - arr
  selector:
    matchLabels:
      monitoring: "true"
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
