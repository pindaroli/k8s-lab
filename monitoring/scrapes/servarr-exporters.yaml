apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-exporter
  namespace: arr
  labels:
    app.kubernetes.io/name: qbittorrent-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent-exporter
    spec:
      containers:
        - name: qbit-exporter
          image: esity/qbit-exporter:latest
          env:
            - name: QBIT_URL
              value: "http://servarr-qbittorrent-web.arr.svc.cluster.local:8080"
            - name: QBIT_USERNAME
              value: "admin"
            - name: QBIT_PASSWORD
              value: "admin"
          ports:
            - name: metrics
              containerPort: 1234
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
