apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-exporter
  namespace: arr
  labels:
    app.kubernetes.io/name: radarr-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr-exporter
    spec:
      containers:
        - name: exportarr
          image: ghcr.io/prometheus-community/exportarr:v2.0.1
          args: [ "radarr" ]
          env:
            - name: URL
              value: "http://servarr-radarr.arr.svc.cluster.local:7878"
            - name: APIKEY
              value: "0fb8a980d549466585c98632b5275b47"
            - name: PORT
              value: "9150"
          ports:
            - name: metrics
              containerPort: 9150
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-exporter
  namespace: arr
  labels:
    app.kubernetes.io/name: radarr-exporter
    monitoring: "true"
spec:
  selector:
    app.kubernetes.io/name: radarr-exporter
  ports:
    - name: metrics
      port: 9150
      targetPort: 9150
---
