apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-csi
provisioner: nfs.csi.k8s.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - hard
  - nfsvers=4.1
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: csi-nfs-stripe-arr-conf
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: nfs.csi.k8s.io
parameters:
  # NFS server configuration
  server: 10.10.20.50
  share: /mnt/stripe/k8s-arr
  
  # Dynamic subdirectory naming: service-name-namespace
  subDir: ${pvc.metadata.name}
  
  # Set folder permissions to 777
  mountPermissions: "0777"
  
  # Volume deletion policy
  onDelete: retain

# Reclaim policy
reclaimPolicy: Delete
# Volume binding mode
volumeBindingMode: Immediate
# Allow volume expansion
allowVolumeExpansion: true
# NFS mount options
mountOptions:
  - nfsvers=4.1
  - rsize=1048576
  - wsize=1048576
  - hard
  - timeo=600
  - retrans=2
