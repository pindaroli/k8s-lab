# Self-signed certificate for *.local domains
# Since .local domains are not publicly resolvable, we use a self-signed issuer

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-wildcard-cert
  namespace: traefik
spec:
  secretName: local-wildcard-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
  - "*.local"
  - "local"
  commonName: "*.local"
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 2048
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days before expiry