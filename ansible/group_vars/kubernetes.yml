---
# Variables for Kubernetes cluster nodes

# Kubernetes configuration
kubernetes:
  distribution: microk8s
  version: latest

  # Network
  cluster_cidr: 10.1.0.0/16
  service_cidr: 10.152.183.0/24

  # DNS
  cluster_dns: 10.152.183.10
  cluster_domain: cluster.local

# MicroK8s addons
microk8s_addons:
  - dns
  - storage
  - helm3
  - metallb:192.168.1.3-192.168.1.13

# MetalLB configuration
metallb:
  namespace: metallb
  ip_pool:
    start: 192.168.1.3
    end: 192.168.1.13
  mode: L2Advertisement

# Storage
storage:
  nfs_server: 192.168.1.250
  nfs_enabled: true
  csi_driver: nfs.csi.k8s.io

# Ingress
ingress:
  controller: traefik
  namespace: default
  loadbalancer_ip: 192.168.1.3

# Certificate Management
cert_manager:
  enabled: true
  namespace: cert-manager
  email: o.pindaro@gmail.com
  dns_provider: cloudflare
  wildcard_domain: "*.pindaroli.org"

# OAuth2 Proxy
oauth2_proxy:
  enabled: true
  namespace: oauth2-proxy
  provider: google
  authorized_email: o.pindaro@gmail.com
  cookie_domain: .pindaroli.org
  auth_url: https://auth.pindaroli.org

# Application namespaces
namespaces:
  - arr
  - metallb
  - cert-manager
  - oauth2-proxy
  - cloudflare
