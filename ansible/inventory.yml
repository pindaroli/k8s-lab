---
# Ansible Inventory for k8s-lab Infrastructure
# Network: 192.168.1.0/24
# Domain: pindaroli.org (external), .local (internal)

all:
  children:
    # Kubernetes Cluster
    kubernetes:
      children:
        k8s_control:
          hosts:
            k8s-control:
              ansible_host: 192.168.1.11
              ansible_user: root
              vm_id: 1500
              vm_platform: proxmox
              description: "Kubernetes control plane node (microk8s)"

        k8s_workers:
          hosts:
            k8s-runner-1:
              ansible_host: k8s-runner-1
              ansible_user: root
              vm_id: 1100
              vm_platform: truenas
              description: "Kubernetes worker node"

      vars:
        ansible_python_interpreter: /usr/bin/python3
        k8s_distribution: microk8s
        k8s_network: 192.168.1.0/24

    # Infrastructure Management
    infrastructure:
      children:
        hypervisors:
          hosts:
            pve2:
              ansible_host: 192.168.1.10
              ansible_user: root
              ansible_port: 22
              web_port: 8006
              description: "Proxmox VE node 2"
              manages_vms:
                - k8s-control
                - k8s-runner-1

            pve:
              ansible_host: 192.168.1.125
              ansible_user: root
              ansible_port: 22
              web_port: 8006
              description: "Proxmox VE node 1"
              manages_vms: []

        storage:
          hosts:
            truenas:
              ansible_host: 192.168.1.250
              ansible_user: olindo
              web_port: 443
              nfs_server: true
              description: "TrueNAS storage server (NFS CSI backend)"

        media_servers:
          hosts:
            jellyfin-svr:
              ansible_host: 192.168.1.12
              ansible_user: root
              description: "Jellyfin media server"

        network:
          hosts:
            opnsense:
              ansible_host: 192.168.1.1
              ansible_user: root
              web_port: 443
              description: "OPNsense firewall and router"
              services:
                - firewall
                - dhcp
                - dns
                - upnp

      vars:
        ansible_python_interpreter: /usr/bin/python3
        proxmox_cluster: true

    # Service Groups (for targeted operations)
    metallb_pool:
      hosts:
        k8s-control:
      vars:
        metallb_ip_range: "192.168.1.3-192.168.1.13"
        metallb_namespace: metallb

    cert_managers:
      hosts:
        k8s-control:
      vars:
        domain: pindaroli.org
        dns_provider: cloudflare
        letsencrypt_email: o.pindaro@gmail.com

  # Global variables for all hosts
  vars:
    # Network configuration
    network_gateway: 192.168.1.1
    network_subnet: 192.168.1.0/24
    local_domain: local
    external_domain: pindaroli.org

    # DNS
    dns_server: 192.168.1.1

    # Ansible connection settings
    ansible_connection: ssh
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

    # User info
    admin_email: o.pindaro@gmail.com
