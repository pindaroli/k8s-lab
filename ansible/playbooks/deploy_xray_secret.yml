---
- name: Deploy Xray Client Secret to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files:
    - "../vars/secrets.yml"
    - "../../xray/xray_secrets.yml"

  tasks:
    - name: Ensure 'arr' namespace exists
      kubernetes.core.k8s:
        name: arr
        api_version: v1
        kind: Namespace
        state: present

    - name: Generate Xray Config JSON
      set_fact:
        xray_json_content: "{{ lookup('template', '../../xray/templates/client_config.json.j2') }}"

    - name: Create 'xray-client-config' Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: xray-client-config
            namespace: arr
          type: Opaque
          data:
            config.json: "{{ xray_json_content | b64encode }}"
