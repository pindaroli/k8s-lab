---
# Playbook to update n8n configuration and restart deployment
# Uses updated manifest files from n8n directory
- name: Update n8n Configuration
  hosts: localhost
  gather_facts: no
  become: no
  vars:
    n8n_namespace: default
    n8n_chart_oci: oci://8gears.container-registry.com/library/n8n
    n8n_chart_version: "1.0.15"
    n8n_release_name: n8n
    n8n_manifests_dir: "{{ playbook_dir }}/../../n8n"
    k8s_control_host: k8s-control

  tasks:
    - name: Display update banner
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   n8n Configuration Update                                ║"
          - "║   Updating deployment with new configuration              ║"
          - "╚════════════════════════════════════════════════════════════╝"

    - name: Verify n8n manifest files exist
      stat:
        path: "{{ item }}"
      loop:
        - "{{ n8n_manifests_dir }}/n8n-values.yaml"
        - "{{ n8n_manifests_dir }}/n8n-pvc.yaml"
        - "{{ n8n_manifests_dir }}/n8n-ingress-route.yaml"
      register: manifest_check
      failed_when: not manifest_check.stat.exists

    - name: Display configuration files to update
      debug:
        msg:
          - "Configuration files:"
          - "  - n8n-values.yaml"
          - "  - n8n-pvc.yaml"
          - "  - n8n-ingress-route.yaml"

- name: Execute update on k8s-control
  hosts: k8s_control
  gather_facts: no
  vars:
    n8n_namespace: default
    n8n_chart_oci: oci://8gears.container-registry.com/library/n8n
    n8n_chart_version: "1.0.15"
    n8n_release_name: n8n
    n8n_manifests_dir: /tmp/n8n-update

  tasks:
    - name: Create temporary update directory
      file:
        path: "{{ n8n_manifests_dir }}"
        state: directory
        mode: '0755'

    - name: Copy updated n8n manifest files to k8s-control
      copy:
        src: "{{ item }}"
        dest: "{{ n8n_manifests_dir }}/"
        mode: '0644'
      loop:
        - "{{ playbook_dir }}/../../n8n/n8n-values.yaml"
        - "{{ playbook_dir }}/../../n8n/n8n-pvc.yaml"
        - "{{ playbook_dir }}/../../n8n/n8n-ingress-route.yaml"

    - name: Apply updated PersistentVolumeClaim
      command: microk8s kubectl apply -f {{ n8n_manifests_dir }}/n8n-pvc.yaml -n {{ n8n_namespace }}
      register: pvc_apply
      changed_when: "'configured' in pvc_apply.stdout"

    - name: Display PVC update status
      debug:
        msg: "{{ pvc_apply.stdout }}"

    - name: Upgrade n8n Helm release with new values
      command: >
        microk8s helm upgrade {{ n8n_release_name }} {{ n8n_chart_oci }}
        --version {{ n8n_chart_version }}
        -n {{ n8n_namespace }}
        -f {{ n8n_manifests_dir }}/n8n-values.yaml
        --wait
        --timeout 5m
      register: helm_upgrade
      changed_when: true

    - name: Display Helm upgrade status
      debug:
        msg: "{{ helm_upgrade.stdout_lines }}"

    - name: Apply updated Traefik IngressRoute
      command: microk8s kubectl apply -f {{ n8n_manifests_dir }}/n8n-ingress-route.yaml -n {{ n8n_namespace }}
      register: ingress_apply
      changed_when: "'configured' in ingress_apply.stdout"

    - name: Display IngressRoute update status
      debug:
        msg: "{{ ingress_apply.stdout }}"

    - name: Wait for n8n pod to be ready after update
      shell: |
        timeout=300
        interval=10
        elapsed=0
        while [ $elapsed -lt $timeout ]; do
          ready=$(microk8s kubectl get pods -n {{ n8n_namespace }} -l app.kubernetes.io/name=n8n -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")
          if [ "$ready" = "True" ]; then
            echo "n8n pod is ready"
            exit 0
          fi
          echo "Waiting for n8n pod to be ready after update... ($elapsed/$timeout seconds)"
          sleep $interval
          elapsed=$((elapsed + interval))
        done
        echo "Timeout waiting for n8n pod"
        exit 1
      register: pod_wait
      changed_when: false

    - name: Get updated n8n deployment status
      command: microk8s kubectl get pods -n {{ n8n_namespace }} -l app.kubernetes.io/name=n8n -o wide
      register: pod_status
      changed_when: false

    - name: Display updated pod status
      debug:
        var: pod_status.stdout_lines

    - name: Get n8n pod events (last 5)
      shell: microk8s kubectl get events -n {{ n8n_namespace }} --sort-by='.lastTimestamp' --field-selector involvedObject.kind=Pod | grep n8n | tail -5
      register: pod_events
      changed_when: false
      failed_when: false

    - name: Display recent pod events
      debug:
        var: pod_events.stdout_lines
      when: pod_events.stdout_lines | length > 0

    - name: Get n8n service details
      command: microk8s kubectl get svc -n {{ n8n_namespace }} -l app.kubernetes.io/name=n8n
      register: svc_status
      changed_when: false

    - name: Display service status
      debug:
        var: svc_status.stdout_lines

    - name: Cleanup temporary update directory
      file:
        path: "{{ n8n_manifests_dir }}"
        state: absent

- name: Display completion message
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Update complete
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   n8n Configuration Update Complete                       ║"
          - "║   n8n has been updated and restarted                      ║"
          - "║   Access at: https://n8n.pindaroli.org                    ║"
          - "╚════════════════════════════════════════════════════════════╝"