---
# Playbook to restart NFS service on TrueNAS SCALE using REST API
- name: Restart NFS Service on TrueNAS via API
  hosts: localhost
  gather_facts: false
  become: false
  vars_files:
    - ../group_vars/storage/vault.yml

  vars:
    truenas_host: "192.168.1.250"
    truenas_api_key: "{{ vault_truenas_api_key }}"  # From encrypted vault.yml

  tasks:
    - name: Display restart banner
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   Restarting NFS Service on TrueNAS via API              ║"
          - "╚════════════════════════════════════════════════════════════╝"

    - name: Check if API key is set
      fail:
        msg: "Please set TRUENAS_API_KEY environment variable"
      when: truenas_api_key == ""

    - name: Get NFS service status
      uri:
        url: "https://{{ truenas_host }}/api/v2.0/service?service=nfs"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
        return_content: true
      register: nfs_status
      ignore_errors: true

    - name: Display current NFS status
      debug:
        msg: "NFS service state: {{ nfs_status.json[0].state if nfs_status.json is defined else 'unknown' }}"
      when: nfs_status.json is defined

    - name: Restart NFS service
      uri:
        url: "https://{{ truenas_host }}/api/v2.0/service/restart"
        method: POST
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          service: "nfs"
        validate_certs: false
        status_code: 200
      register: restart_result

    - name: Wait for NFS service to restart
      pause:
        seconds: 5

    - name: Verify NFS service is running
      uri:
        url: "https://{{ truenas_host }}/api/v2.0/service?service=nfs"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
        return_content: true
      register: nfs_verify

    - name: Display NFS service status after restart
      debug:
        msg: "NFS service is now: {{ nfs_verify.json[0].state }}"

    - name: Get NFS exports
      uri:
        url: "https://{{ truenas_host }}/api/v2.0/sharing/nfs"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: false
        return_content: true
      register: nfs_exports

    - name: Display NFS exports
      debug:
        msg: "{{ nfs_exports.json | to_nice_json }}"

    - name: Completion message
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   NFS Service Restart Complete                            ║"
          - "║   Service is running and exports are active               ║"
          - "╚════════════════════════════════════════════════════════════╝"
