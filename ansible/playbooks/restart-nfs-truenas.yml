---
# Playbook to restart NFS service on TrueNAS after /etc/exports changes
- name: Restart NFS Service on TrueNAS
  hosts: truenas
  gather_facts: false
  become: true

  tasks:
    - name: Display restart banner
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   Restarting NFS Service on TrueNAS                       ║"
          - "║   Applying /etc/exports changes                           ║"
          - "╚════════════════════════════════════════════════════════════╝"

    - name: Restart NFS server service
      service:
        name: nfs-server
        state: restarted
      register: nfs_restart
      ignore_errors: true

    - name: Alternative - reload exportfs
      command: exportfs -ra
      register: exportfs_reload
      changed_when: true
      when: nfs_restart is failed

    - name: Verify NFS exports are active
      command: exportfs -v
      register: exports_verify
      changed_when: false

    - name: Display active NFS exports
      debug:
        msg: "{{ exports_verify.stdout_lines }}"

- name: Display completion message
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Restart complete
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   NFS Service Restart Complete                            ║"
          - "║   New exports are now active                              ║"
          - "║   jellyfin-svr can now mount media share                  ║"
          - "╚════════════════════════════════════════════════════════════╝"
