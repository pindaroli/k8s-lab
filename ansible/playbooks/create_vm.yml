---
- name: Provision VM on Proxmox
  hosts: hypervisors
  gather_facts: false
  connection: local
  vars:
    proxmox_api_user: "{{ lookup('env', 'PROXMOX_API_USER') | default('root@pam', true) }}"
    proxmox_api_token_id: "{{ lookup('env', 'PROXMOX_API_TOKEN_ID') }}"
    proxmox_api_token_secret: "{{ lookup('env', 'PROXMOX_API_TOKEN_SECRET') }}"
    
    # VM Defaults - Override these via -e "var=value"
    vm_id: 900
    vm_name: ansible-test-vm
    vm_memory: 2048
    vm_cores: 2
    vm_disk_size: 20
    vm_storage: local-lvm
    vm_net_bridge: vmbr0
    # Example ISO: local:iso/debian-12.5.0-amd64-netinst.iso
    # Set vm_iso to use CDROM installation
    vm_iso: "" 
    
  tasks:
    - name: Check for API Token
      fail:
        msg: "Please set PROXMOX_API_TOKEN_ID and PROXMOX_API_TOKEN_SECRET environment variables."
      when: proxmox_api_token_id == "" or proxmox_api_token_secret == ""

    - name: Create VM
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ inventory_hostname }}"
        vmid: "{{ vm_id }}"
        name: "{{ vm_name }}"
        memory: "{{ vm_memory }}"
        cores: "{{ vm_cores }}"
        cpu: host
        net:
          net0: "model=virtio,bridge={{ vm_net_bridge }}"
        scsihw: virtio-scsi-pci
        virtio:
          virtio0: "{{ vm_storage }}:{{ vm_disk_size }}"
        ide:
          ide2: "{{ vm_iso }},media=cdrom"
        state: present
      register: vm_creation
      when: vm_iso != ""

    - name: Create VM (No ISO)
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ inventory_hostname }}"
        vmid: "{{ vm_id }}"
        name: "{{ vm_name }}"
        memory: "{{ vm_memory }}"
        cores: "{{ vm_cores }}"
        cpu: host
        net:
          net0: "model=virtio,bridge={{ vm_net_bridge }}"
        scsihw: virtio-scsi-pci
        virtio:
          virtio0: "{{ vm_storage }}:{{ vm_disk_size }}"
        state: present
      register: vm_creation_no_iso
      when: vm_iso == ""

    - name: Start VM
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ inventory_hostname }}"
        vmid: "{{ vm_id }}"
        state: started
      when: (vm_creation.changed | default(false)) or (vm_creation_no_iso.changed | default(false))
