---
- name: Sync DNS Records to Cloudflare
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # Global API Key Strategy
    cloudflare_email: "{{ cloudflare_email | default('') }}"
    cloudflare_api_key: "{{ cloudflare_api_key | default('') }}"
    zone: "pindaroli.org"
    target_ip: "10.10.20.56" 
    
  vars_files:
    - "../vars/secrets.yml"
    - "../../rete.json"

  tasks:
    - name: Fail if credentials missing
      fail:
        msg: "cloudflare_email and cloudflare_api_key are required."
      when: cloudflare_email == '' or cloudflare_api_key == ''

    - name: Find Traefik LB Node
      set_fact:
        traefik_node: "{{ nodi | selectattr('id', 'equalto', 'traefik-lb') | first }}"

    - name: Ensure DNS Records exist on Cloudflare (CNAME to Root)
      community.general.cloudflare_dns:
        zone: "{{ zone }}"
        record: "{{ item }}"
        type: CNAME
        value: "{{ zone }}" # CNAME to pindaroli.org
        account_email: "{{ cloudflare_email }}"
        account_api_token: "{{ cloudflare_api_key }}"
        state: present
        proxied: no
      loop: "{{ traefik_node.aliases }}"
      when: not item.endswith('-internal') and item != 'nas' and item != 'minio'

    - name: Ensure Internal DNS Records are BLACKHOLED on Cloudflare
      community.general.cloudflare_dns:
        zone: "{{ zone }}"
        record: "{{ item }}-internal"
        type: A
        value: "0.0.0.0" # Blackhole to override Wildcard and prevent external resolution
        account_email: "{{ cloudflare_email }}"
        account_api_token: "{{ cloudflare_api_key }}"
        state: present
        proxied: no
      loop: "{{ traefik_node.aliases }}"
      when: not item.endswith('-internal')
