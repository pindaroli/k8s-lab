---
- name: Configure Talos DHCP Reservations on OPNsense
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "../vars/opnsense_secrets.yml"
  
  vars:
    opnsense_url: "https://192.168.2.254" # Verify your OPNsense IP (Gateway of VLAN 20 is 10.10.20.1, Transit is 192.168.2.254)
    opnsense_api_key: "{{ api_key }}"
    opnsense_api_secret: "{{ api_secret }}"
    # Interface UUID for VLAN 20 (You verify this via API or GUI)
    # Usually 'optX' or the UUID. If unsure, use the GUI first.
    interface_name: "opt2" # From rete.json: igc1_vlan20 is opt2
    
    reservations:
      - hostname: "talos-cp-01"
        ip: "10.10.20.141"
        mac: "bc:24:11:81:6a:19" # FROM SCREENSHOT
        descr: "Talos Control Plane 01"
        
      - hostname: "talos-cp-02"
        ip: "10.10.20.142"
        mac: "bc:24:11:77:40:fc" # FROM SCREENSHOT
        descr: "Talos Control Plane 02"
        
      - hostname: "talos-cp-03"
        ip: "10.10.20.143"
        mac: "bc:24:11:0b:e0:61" # FROM SCREENSHOT
        descr: "Talos Control Plane 03"

  tasks:
    - name: Ensure DHCP Static Mappings exist
      opnsense.opnsense.dhcp_static_map:
        url: "{{ opnsense_url }}"
        api_key: "{{ opnsense_api_key }}"
        api_secret: "{{ opnsense_api_secret }}"
        interface: "{{ interface_name }}"
        mac: "{{ item.mac }}"
        ip: "{{ item.ip }}"
        hostname: "{{ item.hostname }}"
        descr: "{{ item.descr }}"
        state: present
      loop: "{{ reservations }}"
      no_log: true
