---
- name: Network Scan with OPNsense API Integration
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files:
    - ../vars/opnsense_secrets.yml
  vars:
    subnet: "192.168.1.0/24"
    opnsense_url: "https://192.168.1.1"
    tmp_dir: "/tmp/network_scan"

  tasks:
    - name: Create temp directory
      file:
        path: "{{ tmp_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch DHCP Leases from OPNsense API
      uri:
        url: "{{ opnsense_url }}/api/dhcpv4/leases/searchLease"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: yes
        validate_certs: no
        return_content: yes
        headers:
          Content-Type: "application/json"
        body_format: json
        body: {}
      register: leases_response

    - name: Save Leases to JSON file
      copy:
        content: "{{ leases_response.json | to_nice_json }}"
        dest: "{{ tmp_dir }}/opnsense_leases.json"

    - name: Run ARP Scan from PVE node
      shell: ssh -o BatchMode=yes root@192.168.1.125 "nmap -sn -n -PR {{ subnet }} -oG -" > {{ tmp_dir }}/nmap.scan
      changed_when: false

    - name: Create Python Report Script
      copy:
        dest: "{{ tmp_dir }}/scan_report_api.py"
        content: |
          import json
          import ipaddress
          import os

          # --- Data Ingestion ---
          with open("{{ tmp_dir }}/opnsense_leases.json", "r") as f:
              leases_data = json.load(f)
              
          with open("{{ tmp_dir }}/nmap.scan", "r") as f:
              nmap_output = f.read()
          
          dhcp_map = {} # IP -> {"hostname": str, "mac": str, "type": "static"|"dynamic", "descr": str}

          # --- Parse OPNsense API Data ---
          # The API returns a dict with "rows": [ ... ]
          rows = leases_data.get("rows", [])
          for row in rows:
              ip = row.get("address", "")
              if ip:
                  dhcp_map[ip] = {
                      "hostname": row.get("hostname", "") or row.get("client-hostname", ""),
                      "mac": row.get("mac", "").lower(),
                      "type": row.get("type", ""),
                      "descr": row.get("descr", "")
                  }

          # --- Parse Nmap ARP Scan ---
          active_hosts = {} # IP -> {"status": "Up"}
          for line in nmap_output.splitlines():
              if "Status: Up" in line:
                  # Host: 192.168.1.1 ()	Status: Up
                  parts = line.split()
                  ip = parts[1]
                  active_hosts[ip] = {"status": "Up"}
          
          # --- Generate Report ---
          print(f"{chr(27)}[1m{'IP Address':<16} {'Status':<10} {'Type':<10} {'Hostname':<30} {'Description':<30}{chr(27)}[0m")
          print("-" * 100)

          subnet = ipaddress.ip_network("{{ subnet }}")
          
          # Sort by IP
          sorted_ips = sorted([str(ip) for ip in subnet.hosts()], key=lambda ip: ipaddress.IPv4Address(ip))

          for ip in sorted_ips:
              info = dhcp_map.get(ip, {})
              is_active = ip in active_hosts
              
              if is_active or info:
                  status = "ONLINE" if is_active else "Offline"
                  color = chr(27)+"[32m" if is_active else chr(27)+"[90m" # Green or Grey
                  reset = chr(27)+"[0m"
                  
                  hname = info.get("hostname", "")
                  dtype = info.get("type", "")
                  descr = info.get("descr", "")
                  
                  # Only show if active OR has a static mapping (interesting nodes)
                  if is_active or dtype == "static":
                       print(f"{color}{ip:<16} {status:<10} {dtype:<10} {hname:<30} {descr:<30}{reset}")

    - name: Execute Report Script
      command: python3 {{ tmp_dir }}/scan_report_api.py
      register: scan_report
      changed_when: false

    - name: Show Network Report
      debug:
        msg: "{{ scan_report.stdout_lines }}"
