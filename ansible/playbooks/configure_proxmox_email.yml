---
- name: Configure Proxmox Email Notifications
  hosts: hypervisors
  become: true
  vars:
    admin_email: "o.pindaro@gmail.com"

  tasks:
    - name: Configure root@pam email address
      command: >
        pveum user modify root@pam --email {{ admin_email }}
      run_once: true
      register: pveum_result
      changed_when: "pveum_result.rc == 0"
      # We could try to detect if change is needed, but modify is safe enough usually.
      # Ideally we would check first, but for now this ensures it is set.

    - name: Ensure /root/.forward uses proxmox-mail-forward
      copy:
        content: "|/usr/libexec/proxmox-mail-forward\n"
        dest: /root/.forward
        owner: root
        group: root
        mode: '0644'
