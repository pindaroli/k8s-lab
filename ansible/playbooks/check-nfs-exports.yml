---
# Playbook to check available NFS exports on TrueNAS server
- name: Check NFS Exports on TrueNAS
  hosts: truenas
  gather_facts: false
  become: false

  tasks:
    - name: Display check banner
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   Checking NFS Exports on TrueNAS                         ║"
          - "╚════════════════════════════════════════════════════════════╝"

    - name: Check NFS exports via exportfs
      command: exportfs -v
      register: exportfs_result
      changed_when: false
      ignore_errors: true

    - name: Display active NFS exports
      debug:
        msg: "{{ exportfs_result.stdout_lines }}"
      when: exportfs_result.rc == 0

    - name: Check /etc/exports file
      command: cat /etc/exports
      register: exports_file
      changed_when: false
      ignore_errors: true

    - name: Display /etc/exports content
      debug:
        msg: "{{ exports_file.stdout_lines }}"
      when: exports_file.rc == 0

    - name: List directory structure for arrdata
      shell: ls -la /mnt/*/arrdata 2>/dev/null || echo "No arrdata directory found"
      register: arrdata_check
      changed_when: false

    - name: Display arrdata directories
      debug:
        msg: "{{ arrdata_check.stdout_lines }}"

- name: Display completion message
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check complete
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   NFS Export Check Complete                               ║"
          - "║   Review output above to verify correct NFS paths         ║"
          - "╚════════════════════════════════════════════════════════════╝"
