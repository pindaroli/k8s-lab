---
- name: Configure OPNsense Unbound DNS Overrides
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # Credentials (passed via extra-vars is safer, e.g. -e "api_key=... api_secret=...")
    api_key: "{{ opnsense_api_key | default('') }}"
    api_secret: "{{ opnsense_api_secret | default('') }}"
    opnsense_url: "https://192.168.2.254"
    domain: "pindaroli.org"

  vars_files:
    - "../vars/secrets.yml"
    - "../../rete.json"

  tasks:
    - name: Fail if credentials are missing
      fail:
        msg: "Please provide api_key and api_secret via extra vars or inventory."
      when: api_key == '' or api_secret == ''

    # ---------------------------------------------------------
    # STEP 1: INITIALIZE ACCUMULATOR
    # We create an empty list 'dns_h' to store all our DNS records.
    # ---------------------------------------------------------
    - name: Initialize DNS Host List
      set_fact:
        dns_h: []

    # ---------------------------------------------------------
    # STEP 2: PARSE MAIN NODES (Pass 1)
    # Loop through every node in rete.json.
    # Extract its IP and add it to dns_h as a primary record.
    # ---------------------------------------------------------
    - name: Parse Main Network Nodes
      set_fact:
        dns_h: "{{ dns_h + [{ 'hostname': item.id, 'domain': domain, 'ip': item_ip, 'desc': 'Host from rete.json' }] }}"
      vars:
        # Logic to find the IP in the complex rete.json structure
        item_ip: >-
          {{
            item.ip | default(
              item['management IP'] | default(
                item.management_ip | default(
                  item.management_ip_vlan10 | default(
                    (item.interfaces | selectattr('ip', 'defined') | map(attribute='ip') | first) | default(
                      (item.ports | default([]) | selectattr('logical_interfaces', 'defined') | map(attribute='logical_interfaces') | flatten | selectattr('subnet', 'defined') | map(attribute='subnet') | first | regex_replace('/.*$', '') ) | default('')
                    )
                  )
                )
              )
            )
          }}
      loop: "{{ nodi }}"
      when: item_ip | length > 0

    # ---------------------------------------------------------
    # STEP 3: PARSE ALIASES (Pass 2)
    # Loop ONLY through nodes that have 'aliases'.
    # 'subelements' gives us a pair: item.0 (Parent Node), item.1 (Alias Name).
    # We use Parent's IP (item.0) with Alias Name (item.1).
    # ---------------------------------------------------------
    - name: Parse Network Aliases
      set_fact:
        dns_h: "{{ dns_h + [{ 'hostname': alias_name, 'domain': domain, 'ip': parent_ip, 'desc': 'Alias for ' + parent_node.id }] }}"
      vars:
        parent_node: "{{ item.0 }}"
        alias_name: "{{ item.1 }}"
        parent_ip: >-
           {{ parent_node.ip | default(parent_node['management IP'] | default(parent_node.management_ip | default(parent_node.management_ip_vlan10 | default((parent_node.interfaces | selectattr('ip', 'defined') | map(attribute='ip') | first) | default((parent_node.ports | default([]) | selectattr('logical_interfaces', 'defined') | map(attribute='logical_interfaces') | flatten | selectattr('subnet', 'defined') | map(attribute='subnet') | first | regex_replace('/.*$', '') ) | default('')))))) }}
      loop: "{{ nodi | subelements('aliases', skip_missing=True) }}"
      when: parent_ip | length > 0


    # ---------------------------------------------------------
    # STEP 4: VERIFY DATA
    # ---------------------------------------------------------
    - name: Display calculated DNS records (Debug)
      debug:
        msg: "Record: {{ item.hostname }}.{{ item.domain }} -> {{ item.ip }} ({{ item.desc }})"
      loop: "{{ dns_h }}"

    # ---------------------------------------------------------
    # STEP 5: PUSH TO OPNSENSE API
    # ---------------------------------------------------------
    - name: Add/Update Host Overrides in OPNsense
      uri:
        url: "{{ opnsense_url }}/api/unbound/settings/addHostOverride"
        method: POST
        user: "{{ api_key }}"
        password: "{{ api_secret }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          host:
            hostname: "{{ item.hostname }}"
            domain: "{{ item.domain }}"
            server: "{{ item.ip }}"
            description: "{{ item.desc }}"
            enabled: "1"
        status_code: [200, 201]
        return_content: yes
      loop: "{{ dns_h }}"
      register: api_result
      
    - name: Apply Unbound Configuration
      uri:
        url: "{{ opnsense_url }}/api/unbound/service/reconfigure"
        method: POST
        user: "{{ api_key }}"
        password: "{{ api_secret }}"
        force_basic_auth: yes
        validate_certs: no
        status_code: 200


