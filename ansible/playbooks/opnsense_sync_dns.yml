---
- name: Configure OPNsense Unbound DNS Overrides
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Credentials (passed via extra-vars is safer, e.g. -e "api_key=... api_secret=...")
    api_key: "{{ opnsense_api_key | default('') }}"
    api_secret: "{{ opnsense_api_secret | default('') }}"
    opnsense_url: "https://192.168.2.254"
    domain: "pindaroli.org"

  vars_files:
    - "../vars/secrets.yml"
    - "../../rete.json"

  tasks:
    - name: Fail if credentials are missing
      fail:
        msg: "Please provide api_key and api_secret via extra vars or inventory."
      when: api_key == '' or api_secret == ''

    # ---------------------------------------------------------
    # STEP 1: GENERATE DNS RECORDS VIA PYTHON
    # We delegate the complexity of parsing rete.json and generating
    # aliases to the python script, which acts as the Source of Truth.
    # ---------------------------------------------------------
    - name: Generate DNS Records from rete.json
      command:
        cmd: "python3 scripts/validate_rete_dns.py --file ../../rete.json --json"
      register: dns_gen_result
      changed_when: false

    - name: Parse Generated JSON
      set_fact:
        dns_h: "{{ dns_gen_result.stdout | from_json }}"

    - name: Display DNS Records (Debug)
      debug:
        msg: "Loaded {{ dns_h | length }} records from Python generator."

    - name: Prune Duplicate and Conflicting DNS records
      command:
        cmd: "python3 scripts/prune_opnsense_dns.py --api-key '{{ api_key }}' --api-secret '{{ api_secret }}' --url '{{ opnsense_url }}'"
      environment:
        PRUNE_ORPHANS: "true"
      register: prune_result
      changed_when: "'Deleted' in prune_result.stdout"

    # ---------------------------------------------------------
    # STEP 5: PUSH TO OPNSENSE API
    # ---------------------------------------------------------
    - name: Add/Update Host Overrides in OPNsense
      uri:
        url: "{{ opnsense_url }}/api/unbound/settings/addHostOverride"
        method: POST
        user: "{{ api_key }}"
        password: "{{ api_secret }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          host:
            hostname: "{{ item.hostname }}"
            domain: "{{ item.domain }}"
            server: "{{ item.ip }}"
            description: "{{ item.desc }}"
            enabled: "1"
        status_code: [200, 201]
        return_content: yes
      loop: "{{ dns_h }}"
      register: api_result

    - name: Apply Unbound Configuration
      uri:
        url: "{{ opnsense_url }}/api/unbound/service/reconfigure"
        method: POST
        user: "{{ api_key }}"
        password: "{{ api_secret }}"
        force_basic_auth: yes
        validate_certs: no
        status_code: 200

    # ---------------------------------------------------------
    # STEP 6: EXTRACT DHCP RESERVATIONS
    # ---------------------------------------------------------
    - name: Extract DHCP Reservations from rete.json
      command:
        cmd: "python3 scripts/extract_dhcp_from_rete_json.py --file ../../rete.json"
      register: dhcp_gen_result
      changed_when: false

    - name: Parse Generated DHCP JSON
      set_fact:
        dhcp_list: "{{ dhcp_gen_result.stdout | from_json }}"

    - name: Display DHCP Records (Debug)
      debug:
        msg: "Loaded {{ dhcp_list | length }} DHCP reservations from Python generator."

    # ---------------------------------------------------------
    # STEP 7: PUSH DHCP RESERVATIONS TO OPNSENSE
    # ---------------------------------------------------------
    - name: Ensure DHCP Static Mappings exist in Kea
      command:
        cmd: "python3 scripts/push_kea_dhcp_to_opnsense.py --api-key '{{ api_key }}' --api-secret '{{ api_secret }}' --url '{{ opnsense_url }}'"
      args:
        stdin: "{{ dhcp_gen_result.stdout }}"
