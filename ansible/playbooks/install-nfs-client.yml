---
# Playbook to install NFS client on media servers and mount NFS shares
# This installs nfs-common package (NFS client utilities only, not server)
# and configures the same NFS mounts used by Jellyfin in Kubernetes
- name: Install NFS Client and Configure Mounts on Media Servers
  hosts: media_servers
  gather_facts: true
  become: true

  vars:
    nfs_server: 192.168.1.250
    nfs_mounts:
      - name: "Media Share"
        src: "{{ nfs_server }}:/mnt/oliraid/arrdata/media"
        path: /mnt/nfs/media
        opts: "nfsvers=4.1,hard,_netdev"
      - name: "Config Share"
        src: "{{ nfs_server }}:/mnt/stripe/k8s-arr"
        path: /mnt/nfs/k8s-arr
        opts: "nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,_netdev"

  tasks:
    - name: Display installation banner
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   NFS Client Installation & Mount Configuration           ║"
          - "║   Installing nfs-common and mounting NFS shares           ║"
          - "╚════════════════════════════════════════════════════════════╝"

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update
      changed_when: apt_update.changed

    - name: Install NFS client packages
      apt:
        name:
          - nfs-common
        state: present
      register: nfs_install

    - name: Display installation result
      debug:
        msg: "{{ 'NFS client installed successfully' if nfs_install.changed else 'NFS client already installed' }}"

    - name: Verify NFS client installation
      command: dpkg -l nfs-common
      register: nfs_verify
      changed_when: false
      failed_when: nfs_verify.rc != 0

    - name: Display NFS client version
      shell: dpkg -l nfs-common | grep ^ii | awk '{print $2, $3}'
      register: nfs_version
      changed_when: false

    - name: Show installed version
      debug:
        msg: "Installed: {{ nfs_version.stdout }}"

    - name: Ensure rpcbind service is enabled and running
      systemd:
        name: rpcbind
        state: started
        enabled: yes
      register: rpcbind_status

    - name: Display rpcbind status
      debug:
        msg: "rpcbind service is {{ rpcbind_status.state }}"

    - name: Create NFS mount point directories
      file:
        path: "{{ item.path }}"
        state: directory
        mode: '0755'
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Configure NFS mounts in /etc/fstab
      mount:
        path: "{{ item.path }}"
        src: "{{ item.src }}"
        fstype: nfs
        opts: "{{ item.opts }}"
        state: present
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.name }}: {{ item.src }} -> {{ item.path }}"

    - name: Mount all NFS shares
      mount:
        path: "{{ item.path }}"
        src: "{{ item.src }}"
        fstype: nfs
        opts: "{{ item.opts }}"
        state: mounted
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.name }}"
      register: mount_result

    - name: Verify NFS mounts are active
      command: "df -h {{ item.path }}"
      loop: "{{ nfs_mounts }}"
      loop_control:
        label: "{{ item.path }}"
      register: mount_verify
      changed_when: false

    - name: Display mounted NFS shares
      debug:
        msg: "{{ mount_verify.results | map(attribute='stdout_lines') | list }}"

- name: Display completion message
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Installation complete
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║   NFS Client Installation & Mount Complete                ║"
          - "║   Mounted shares:                                         ║"
          - "║   - /mnt/nfs/media (arrdata/media)                        ║"
          - "║   - /mnt/nfs/k8s-arr (stripe/k8s-arr)                     ║"
          - "╚════════════════════════════════════════════════════════════╝"
