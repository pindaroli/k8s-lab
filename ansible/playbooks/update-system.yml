---
# Playbook to update all systems in the infrastructure
- name: Update all infrastructure hosts
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages (Debian/Ubuntu)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      when: ansible_os_family == "Debian"
      register: apt_upgrade

    - name: Display upgrade results
      debug:
        msg: "{{ inventory_hostname }}: Packages upgraded successfully"
      when: apt_upgrade is changed

    - name: Check if reboot is required (Debian/Ubuntu)
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_os_family == "Debian"

    - name: Display reboot requirement
      debug:
        msg: "{{ inventory_hostname }} requires a reboot!"
      when:
        - ansible_os_family == "Debian"
        - reboot_required.stat.exists

- name: Update Kubernetes nodes specifically
  hosts: kubernetes
  become: yes
  tasks:
    - name: Refresh microk8s snap
      command: snap refresh microk8s
      register: snap_refresh
      changed_when: "'microk8s' in snap_refresh.stdout"
      failed_when: false

    - name: Display microk8s update status
      debug:
        var: snap_refresh.stdout_lines
