---
- name: Verify VM Configuration
  hosts: pve
  gather_facts: false
  vars:
    vmid: 8001
    expected_boot_order: "ide2;virtio0;net0"
    expected_iso: "local:iso/talos-v1.9.0-metal-amd64.iso"

  tasks:
    - name: Get VM configuration
      ansible.builtin.shell: "qm config {{ vmid }}"
      register: vm_config
      changed_when: false

    - name: Check Boot Order
      ansible.builtin.set_fact:
        current_boot_order: "{{ vm_config.stdout | regex_search('^boot: order=(.+)$', '\\1', multiline=True) | first }}"

    - name: Verify Boot Order
      ansible.builtin.fail:
        msg: "Boot order mismatch! Expected: {{ expected_boot_order }}, Found: {{ current_boot_order }}"
      when: current_boot_order != expected_boot_order

    - name: Verify ISO Attachment
      ansible.builtin.fail:
        msg: "Talos ISO not found in configuration!"
      when: expected_iso not in vm_config.stdout

    - name: Success Message
      ansible.builtin.debug:
        msg: "VM {{ vmid }} configuration is correct."
