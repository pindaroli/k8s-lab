---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Basic Authentication Middleware for Local Access
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-secret
  namespace: traefik
type: Opaque
data:
  # Generated with: htpasswd -nb admin 'PASSWORD'
  # Username: admin, Password: see secrets/setEnv.sh
  users: YWRtaW46JGFwcjEkTWVXdkpQZ2gkQzlwd1piSTFaeHY4MWdKMm84dEF2MQ==
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: traefik
spec:
  basicAuth:
    secret: basic-auth-secret
    removeHeader: true

apiVersion: v1
kind: Service
metadata:
  name: jellyfin-external-k8s-service
  namespace: arr # Same namespace as IngressRoute
spec:
  ports:
  - port: 8096
    targetPort: 8096
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin-external-k8s-service
  namespace: arr # Same namespace as IngressRoute
subsets:
- addresses:
  - ip: "10.10.20.12"
  ports:
  - port: 8096