spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Basic Authentication Middleware for Local Access
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-secret
  namespace: traefik
type: Opaque
data:
  # Generated with: htpasswd -nb admin 'PASSWORD'
  # Username: admin, Password: see setEnv.sh
  users: YWRtaW46JGFwcjEkWGpMSDBKL2Qkb1cvSnEzc1daOW5GU1E3VEpJV2ZCLw==
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: traefik
spec:
  basicAuth:
    secret: basic-auth-secret
    removeHeader: true
# LOCAL DOMAIN INGRESS ROUTES WITH BASIC AUTH
# These duplicate all services for *.local access with basic authentication

---
# Jellyfin Local Access
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-local
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`jellyfin.local`)
    kind: Rule
    services:
    - name: jellyfin-external-k8s-service
      port: 8096
    middlewares:
    - name: basic-auth
      namespace: traefik
  tls:
    secretName: local-wildcard-tls
