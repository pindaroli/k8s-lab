---
apiVersion: v1
kind: Service
metadata:
  name: dns-upstream
  namespace: default
spec:
  type: ClusterIP
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: dns-upstream
  namespace: default
subsets:
- addresses:
  - ip: 192.168.1.1
  ports:
  - port: 53
    protocol: TCP
    name: dns-tcp
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: dot-to-dns-proxy
  namespace: default
spec:
  entryPoints:
    - dot
  routes:
  - match: HostSNI(`*`)
    services:
    - name: dns-upstream
      port: 53
  tls:
    passthrough: true
