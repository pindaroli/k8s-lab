apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-external
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`jellyfin.pindaroli.org`)
    kind: Rule
    services:
    - name: jellyfin-external-k8s-service
      port: 8096
    middlewares:
    - name: oauth2-auth
      namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
---
