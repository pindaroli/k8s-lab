apiVersion: v1
kind: Service
metadata:
  name: dns-upstream
  namespace: default
spec:
  type: ClusterIP
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-external-k8s-service
  namespace: arr # Same namespace as IngressRoute
spec:
  ports:
  - port: 8096
    targetPort: 8096
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin-external-k8s-service
  namespace: arr # Same namespace as IngressRoute
subsets:
- addresses:
  - ip: "192.168.1.12"
  ports:
  - port: 8096