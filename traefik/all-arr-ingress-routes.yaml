    kind: Rule
    services:
    - name: servarr-qbittorrent-web
      port: 8080
    middlewares:
    - name: oauth2-auth
      namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr-ingress-route
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.pindaroli.org`) 
      kind: Rule
      services:
        - name: servarr-radarr
          port: 7878
      middlewares:
        - name: oauth2-auth
          namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Basic Authentication Middleware for Local Access
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-secret
  namespace: traefik
type: Opaque
data:
  # Generated with: htpasswd -nb admin 'PASSWORD'
  # Username: admin, Password: see secrets/setEnv.sh
  users: YWRtaW46JGFwcjEkTWVXdkpQZ2gkQzlwd1piSTFaeHY4MWdKMm84dEF2MQ==
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: traefik
spec:
  basicAuth:
    secret: basic-auth-secret
    removeHeader: true
# LOCAL DOMAIN INGRESS ROUTES WITH BASIC AUTH
# These duplicate all services for *.local access with basic authentication

---
# Jellyfin Local Access
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-local
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`jellyfin-internal.pindaroli.org`)
    kind: Rule
    services:
    - name: jellyfin-external-k8s-service
      port: 8096
    middlewares:
    - name: basic-auth
      namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
