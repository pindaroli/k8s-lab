apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-external
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
  # External / Public: OAuth Protected
  - match: Host(`jellyfin.pindaroli.org`)
    kind: Rule
    services:
    - name: jellyfin-external-k8s-service
      port: 8096
    middlewares:
    - name: oauth2-auth
      namespace: traefik
  # Internal / Short: Basic Auth
  - match: Host(`jellyfin-internal.pindaroli.org`)
    kind: Rule
    services:
    - name: jellyfin-external-k8s-service
      port: 8096
    middlewares:
    - name: basic-auth
      namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lidarr-ingress-route
  namespace: arr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lidarr.pindaroli.org`) 
      kind: Rule
      services:
        - name: servarr-lidarr
          port: 8686
      middlewares:
        - name: oauth2-auth
          namespace: traefik
    # Internal / Short: Basic Auth
    - match: Host(`lidarr`) || Host(`lidarr-internal.pindaroli.org`)
      kind: Rule
      services:
        - name: servarr-lidarr
          port: 8686
      middlewares:
        - name: basic-auth
          namespace: traefik
  tls:
    secretName: pindaroli-wildcard-tls
---
